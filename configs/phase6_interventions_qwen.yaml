judged_path: outputs/judged/qwen_7b_mvp_judged_repaired.jsonl
cluster_assignments_path: outputs/atlas/qwen_7b_mvp/cluster_assignments.csv
output_dir: outputs/interventions/qwen_7b_mvp

model:
  name: Qwen/Qwen2.5-7B-Instruct
  torch_dtype: auto
  device_map: auto
  trust_remote_code: true

generation:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false

sampling:
  max_per_failure_type: 80
  include_failure_types:
    - factual_hallucination
    - open_hallucination
    - reasoning
    - temporal_error
    - bias
    - over_refusal
    - unsafe_compliance
    - sycophancy
  random_state: 42

runtime:
  log_every: 20
  save_every: 20
  seed: 42
